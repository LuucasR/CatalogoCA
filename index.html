<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Competencia Argentina</title>

<link rel="stylesheet" href="css/styles.css">
</head>

<body>


<header>

  <div class="header-left">
    <h1>Competencia Argentina</h1>
  </div>

  <div class="header-right">
    <a href="Privacy-Policy.html">Términos y Condiciones</a>
  </div>

  <div class="header-logo">
    <img src="img/sources/logoCompetenciaArgentinasf.png" alt="Competencia Argentina" class="logo">

  </div>

</header>



<section class="featured-section">
  <div class="featured-inner">
    <h2>Lo más destacado para nuestros clientes</h2>
    <p class="subtitle">Calidad accesible para tu hogar</p>
    <div class="featured-container">
      <button class="featured-arrow left" onclick="scrollFeatured(-1)">‹</button>

      <div class="featured-track" id="featuredProducts"></div>

      <button class="featured-arrow right" onclick="scrollFeatured(1)">›</button>
    </div>
  </div>
</section>

<div class="titlecatalogo">     
  <h2>Catalogo</h2>
</div>

<div class="filters">
  <select id="lineaFilter">
    <option value="all">Todas las líneas</option>
  </select>

  <select id="categoriaFilter">
    <option value="all">Todas las categorías</option>
  </select>
</div>

<div class="container">
  <div class="grid" id="productGrid"></div>
</div>

<footer>
  🇦🇷 Hecho en Argentina – Competencia Argentina © 2026
  <br>
  Desarrollo & Tecnología: Lucas Rodríguez
</footer>


<div class="modal" id="productModal">
  <div class="modal-content">
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script src="js/app.js"></script>

</body>
</html>
